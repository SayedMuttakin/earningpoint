server {
    listen 80;
    server_name satrong-sajghor.top www.satrong-sajghor.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name satrong-sajghor.top www.satrong-sajghor.top;

    ssl_certificate /etc/letsencrypt/live/satrong-sajghor.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/satrong-sajghor.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ✅ WebSocket + HTTP proxy to Node.js backend (port 5001)
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # ✅ These 2 lines are REQUIRED for WebSocket (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
    }
}
